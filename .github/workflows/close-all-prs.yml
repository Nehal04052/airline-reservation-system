name: Close All Open Pull Requests

on:
  workflow_dispatch:

jobs:
  close-prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Close all open pull requests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            let closed = 0;
            for (const pull of pulls) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pull.number,
                  body: 'Closing this pull request as part of a bulk close of all open pull requests.',
                });
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pull.number,
                  state: 'closed',
                });
                console.log(`Closed PR #${pull.number}: ${pull.title}`);
                closed++;
              } catch (err) {
                console.error(`Failed to close PR #${pull.number}: ${err.message}`);
              }
            }

            console.log(`Closed ${closed} of ${pulls.length} pull request(s).`);
